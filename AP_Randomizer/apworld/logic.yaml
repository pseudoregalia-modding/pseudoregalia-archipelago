- spawn_point: underbelly_big_room
  region: Underbelly Main Upper
- spawn_point: bailey_main
  region: Bailey Lower
- spawn_point: keep_main
  region: Keep Main
- spawn_point: keep_north
  region: Keep Main
- spawn_point: theatre_main
  region: Theatre Main

